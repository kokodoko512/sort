<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>乱数生成</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        #number {
            font-size: 80px;
            margin: 30px;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }

        #history {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>乱数生成</h1>

    <div id="number">-</div>

    <button onclick="generateNumber()">生成</button>
    <button onclick="resetNumbers()">リセット</button>

    <div id="history">
        <strong>生成済み:</strong>
        <span id="historyList"></span>
    </div>

    <script>
        let numbers = [];
        let history = [];

        function resetNumbers() {
            numbers = Array.from({ length: 100 }, (_, i) => i + 1);
            history = [];

            document.getElementById("number").textContent = "-";
            document.getElementById("historyList").textContent = "";
        }

        function generateNumber() {
            if (numbers.length === 0) {
                document.getElementById("number").textContent = "終了";
                return;
            }

            const index = Math.floor(Math.random() * numbers.length);
            const number = numbers[index];

            numbers.splice(index, 1);
            history.push(number);

            document.getElementById("number").textContent = number;
            document.getElementById("historyList").textContent =
                history.join(", ");
        }

        resetNumbers();
    </script>

</body>
</html>
