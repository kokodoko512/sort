<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>乱数生成</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        #number {
            font-size: 80px;
            margin: 30px;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <h1>乱数生成</h1>

    <div id="number">-</div>

    <button onclick="generateNumber()">生成</button>
    <button onclick="resetNumbers()">リセット</button>


    <script>
        let numbers = [];
        let history = [];

        function resetNumbers() {
            numbers = Array.from({ length: 100 }, (_, i) => i + 1);
            history = [];

            document.getElementById("number").textContent = "-";
        }

        function generateNumber() {
            if (numbers.length === 0) {
                document.getElementById("number").textContent = "終了";
                return;
            }

            const index = Math.floor(Math.random() * numbers.length);
            const number = numbers[index];

            numbers.splice(index, 1);
            history.push(number);

            document.getElementById("number").textContent = number;
        }

        resetNumbers();
    </script>

</body>
</html>
